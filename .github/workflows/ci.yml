name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Configure git for paperweight
        run: |
          git config --global user.email "ci@fand.local"
          git config --global user.name "Fand CI"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Cache paperweight downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/paperweight
            ~/.gradle/caches/paper
          key: paperweight-${{ runner.os }}-${{ hashFiles('gradle.properties', 'fand-server/build.gradle.kts') }}
          restore-keys: |
            paperweight-${{ runner.os }}-

      - name: Apply patches
        run: ./gradlew :fand-server:applyPatches --no-daemon --stacktrace

      - name: Verify patches are clean
        run: ./gradlew :fand-server:rebuildPatches --no-daemon --stacktrace

      - name: Fail if rebuildPatches modified the tree
        run: |
          if ! git diff --exit-code -- fand-server/patches; then
            echo "::error::rebuildPatches produced a diff. Commit the regenerated patches."
            exit 1
          fi

      - name: Build
        env:
          BASE_VERSION: ${{ vars.RELEASE_VERSION }}
        run: |
          BASE="${BASE_VERSION:-$(grep '^releaseVersion=' gradle.properties | cut -d= -f2)}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${BASE}+build.${GITHUB_RUN_NUMBER}"
          fi
          ./gradlew build --no-daemon --stacktrace -PreleaseVersion="${VERSION}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fand-build-${{ github.sha }}
          path: |
            fand-server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
