name: Publish

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Base release version, e.g. 0.1.4. The workflow publishes x.x.x+build.x.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: publish
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        shell: bash
        env:
          BASE_VERSION: ${{ vars.RELEASE_VERSION }}
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
        run: |
          VERSION="$(bash .github/scripts/derive-release-version.sh)"
          echo "Publishing Fand version: $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Configure git for paperweight
        run: |
          git config --global user.email "ci@fand.local"
          git config --global user.name "Fand CI"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache paperweight downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/paperweight
            ~/.gradle/caches/paper
          key: paperweight-${{ runner.os }}-${{ hashFiles('gradle.properties', 'fand-server/build.gradle.kts') }}
          restore-keys: |
            paperweight-${{ runner.os }}-

      - name: Apply patches
        run: ./gradlew :fand-server:applyPatches --no-daemon --stacktrace -PreleaseVersion="${{ steps.version.outputs.value }}"

      - name: Verify patches are clean
        run: ./gradlew :fand-server:rebuildPatches --no-daemon --stacktrace -PreleaseVersion="${{ steps.version.outputs.value }}"

      - name: Fail if rebuildPatches modified the tree
        run: |
          if ! git diff --exit-code -- fand-server/patches; then
            echo "::error::rebuildPatches produced a diff. Commit the regenerated patches."
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace -PreleaseVersion="${{ steps.version.outputs.value }}"

      - name: Publish API, server, and server clip
        env:
          FAND_REPO_URL: ${{ secrets.FAND_REPO_URL }}
          FAND_REPO_USER: ${{ secrets.FAND_REPO_USER }}
          FAND_REPO_PASSWORD: ${{ secrets.FAND_REPO_PASSWORD }}
        run: ./gradlew --no-daemon --stacktrace :fand-api:publish :fand-server:publish -PreleaseVersion="${{ steps.version.outputs.value }}"
